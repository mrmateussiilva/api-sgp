name: Testes

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest (Python 3.13)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      SECRET_KEY: ci-test-secret
      DATABASE_URL: sqlite:///db/ci-test.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Instalar dependencias
        run: uv sync --frozen

      - name: Rodar testes
        run: uv run pytest -q -m "not integration_db"
